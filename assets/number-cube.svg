    <linearGradient id="front" x1="22" x2="83" y1="49" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6dccff"/>
      <stop offset="1" stop-color="#2aa8ff"/>
    </linearGradient>
  </defs>
  <path fill="url(#top)" stroke="#0d5c9d" stroke-width="5" d="M20 39 64 15l44 24-44 25z"/>
