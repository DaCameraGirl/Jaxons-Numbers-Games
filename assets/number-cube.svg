<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Number cube</title>
  <desc id="desc">A blue blocky cube with bright numbers.</desc>
  <defs>
    <linearGradient id="top" x1="18" x2="98" y1="14" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b8ecff"/>
      <stop offset="1" stop-color="#63c7ff"/>
    </linearGradient>
    <linearGradient id="side" x1="84" x2="112" y1="44" y2="103" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2aa8ff"/>
      <stop offset="1" stop-color="#1167b1"/>
